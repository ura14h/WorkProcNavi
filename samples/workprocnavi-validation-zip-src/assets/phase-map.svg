<svg xmlns="http://www.w3.org/2000/svg" width="720" height="260" viewBox="0 0 720 260" role="img" aria-labelledby="title desc">
  <title id="title">WorkProcNavi ZIP sample phase map</title>
  <desc id="desc">Three phase blocks connected from left to right for import, execution, and completion checks.</desc>
  <rect width="720" height="260" fill="#f7f4ea"/>
  <rect x="36" y="74" width="184" height="112" rx="18" fill="#1f4b3f"/>
  <rect x="268" y="74" width="184" height="112" rx="18" fill="#b86a28"/>
  <rect x="500" y="74" width="184" height="112" rx="18" fill="#2e5b9a"/>
  <text x="128" y="112" font-family="sans-serif" font-size="24" text-anchor="middle" fill="#ffffff">Phase 1</text>
  <text x="128" y="144" font-family="sans-serif" font-size="18" text-anchor="middle" fill="#ffffff">ZIP 読込</text>
  <text x="360" y="112" font-family="sans-serif" font-size="24" text-anchor="middle" fill="#ffffff">Phase 2</text>
  <text x="360" y="144" font-family="sans-serif" font-size="18" text-anchor="middle" fill="#ffffff">表示と操作</text>
  <text x="592" y="112" font-family="sans-serif" font-size="24" text-anchor="middle" fill="#ffffff">Phase 3</text>
  <text x="592" y="144" font-family="sans-serif" font-size="18" text-anchor="middle" fill="#ffffff">保存と完了</text>
  <path d="M220 130 H268" stroke="#5d5448" stroke-width="8" stroke-linecap="round"/>
  <path d="M452 130 H500" stroke="#5d5448" stroke-width="8" stroke-linecap="round"/>
  <polygon points="260,130 242,120 242,140" fill="#5d5448"/>
  <polygon points="492,130 474,120 474,140" fill="#5d5448"/>
  <text x="360" y="222" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#463d33">ZIP 内 Markdown と相対アセットを使った表示確認用イメージ</text>
</svg>
